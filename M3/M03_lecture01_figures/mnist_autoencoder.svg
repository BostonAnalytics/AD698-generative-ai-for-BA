<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="380" version="1.1" viewBox="0 0 980 380" width="980" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="9" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" /></marker><style type="text/css"><![CDATA[
    .label { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
    .title { font-size: 30px; font-weight: 700; }
    .subtitle { font-size: 18px; fill: #4b5563; }
    .section { font-size: 24px; font-weight: 700; }
    .text { font-size: 20px; }
    .small { font-size: 18px; fill: #374151; }
    .box { stroke-width: 2.5; rx: 16; }
    .flow { stroke: #4b5563; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    ]]></style></defs><text class="label title" text-anchor="middle" x="490" y="36">MNIST as an Encoder-Decoder Example</text><text class="label subtitle" text-anchor="middle" x="490" y="64">The encoder compresses a digit; the decoder reconstructs it.</text><rect class="box" fill="#f3f4f6" height="140" stroke="#6b7280" width="140" x="70" y="110" /><path d="M 118 177 C 118 151 156 137 167 161 C 174 176 164 193 146 194 C 126 194 118 214 147 218 C 171 221 182 207 182 193" fill="none" stroke="#111827" stroke-linecap="round" stroke-width="8" /><text class="label section" text-anchor="middle" x="140" y="285">Input</text><text class="label text" text-anchor="middle" x="140" y="310">28 x 28 digit</text><rect class="box" fill="#dbeafe" height="170" stroke="#2563eb" width="170" x="280" y="95" /><text class="label section" text-anchor="middle" x="365" y="142">Encoder</text><text class="label text" text-anchor="middle" x="365" y="176">Flatten 784</text><text class="label text" text-anchor="middle" x="365" y="204">Dense 256</text><text class="label text" text-anchor="middle" x="365" y="232">Dense 64</text><text class="label text" text-anchor="middle" x="365" y="260">ReLU activations</text><rect class="box" fill="#ede9fe" height="90" stroke="#7c3aed" width="120" x="520" y="135" /><text class="label section" text-anchor="middle" x="580" y="170">Latent z</text><text class="label text" text-anchor="middle" x="580" y="198">16 dims</text><rect class="box" fill="#dcfce7" height="170" stroke="#16a34a" width="170" x="710" y="95" /><text class="label section" text-anchor="middle" x="795" y="142">Decoder</text><text class="label text" text-anchor="middle" x="795" y="176">Dense 64</text><text class="label text" text-anchor="middle" x="795" y="204">Dense 256</text><text class="label text" text-anchor="middle" x="795" y="232">Dense 784</text><text class="label text" text-anchor="middle" x="795" y="260">Sigmoid output</text><line class="flow" marker-end="url(#arrow)" x1="210" x2="270" y1="180" y2="180" /><line class="flow" marker-end="url(#arrow)" x1="450" x2="510" y1="180" y2="180" /><line class="flow" marker-end="url(#arrow)" x1="640" x2="700" y1="180" y2="180" /><rect class="box" fill="#f3f4f6" height="140" stroke="#6b7280" width="140" x="800" y="110" /><path d="M 848 177 C 848 151 886 137 897 161 C 904 176 894 193 876 194 C 856 194 848 214 877 218 C 901 221 912 207 912 193" fill="none" stroke="#111827" stroke-linecap="round" stroke-width="8" /><text class="label section" text-anchor="middle" x="870" y="285">Output</text><text class="label text" text-anchor="middle" x="870" y="310">reconstructed digit</text><text class="label small" text-anchor="middle" x="490" y="348">Training objective: minimize reconstruction loss between the input image and the decoder output.</text></svg>