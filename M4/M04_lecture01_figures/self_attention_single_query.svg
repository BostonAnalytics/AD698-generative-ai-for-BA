<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="560" viewBox="0 0 1050 560" role="img" aria-label="Single query token self-attention walkthrough">
  <rect width="1050" height="560" fill="#ffffff"/>
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #111827; }
    .label { font: 600 18px Arial, sans-serif; fill: #111827; }
    .small { font: 15px Arial, sans-serif; fill: #374151; }
    .tiny { font: 13px Arial, sans-serif; fill: #4b5563; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .token { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 7; }
    .query { fill: #fef3c7; stroke: #b45309; stroke-width: 1.8; rx: 7; }
    .value { fill: #dcfce7; stroke: #15803d; stroke-width: 1.5; rx: 7; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    .hot { stroke: #dc2626; stroke-width: 4; marker-end: url(#redarrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="40" y="42" class="title">Self-attention for one query token</text>
  <text x="40" y="78" class="small">A token projects itself into a query, compares that query with every key, then reads a weighted blend of values.</text>

  <text x="64" y="132" class="label">Input embeddings</text>
  <rect x="45" y="150" width="138" height="44" class="token"/>
  <text x="73" y="178" class="small">The</text>
  <rect x="45" y="206" width="138" height="44" class="query"/>
  <text x="66" y="234" class="small">analyst</text>
  <rect x="45" y="262" width="138" height="44" class="token"/>
  <text x="66" y="290" class="small">expects</text>
  <rect x="45" y="318" width="138" height="44" class="token"/>
  <text x="63" y="346" class="small">revenue</text>

  <path d="M185 228 C235 228, 245 130, 300 130" class="hot"/>
  <rect x="300" y="104" width="170" height="54" class="box"/>
  <text x="330" y="137" class="label">q_analyst</text>
  <text x="318" y="178" class="tiny">query vector from W_Q</text>

  <text x="548" y="132" class="label">Compare to every key</text>
  <rect x="535" y="150" width="110" height="40" class="box"/>
  <text x="568" y="175" class="small">k_The</text>
  <rect x="535" y="202" width="110" height="40" class="box"/>
  <text x="550" y="227" class="small">k_analyst</text>
  <rect x="535" y="254" width="110" height="40" class="box"/>
  <text x="552" y="279" class="small">k_expects</text>
  <rect x="535" y="306" width="110" height="40" class="box"/>
  <text x="548" y="331" class="small">k_revenue</text>

  <path d="M470 131 C510 131, 520 170, 535 170" class="arrow"/>
  <path d="M470 131 C510 131, 520 222, 535 222" class="arrow"/>
  <path d="M470 131 C510 131, 520 274, 535 274" class="arrow"/>
  <path d="M470 131 C510 131, 520 326, 535 326" class="arrow"/>

  <text x="724" y="132" class="label">Softmax scores</text>
  <rect x="720" y="150" width="210" height="200" class="box"/>
  <rect x="750" y="176" width="42" height="140" fill="#fee2e2" stroke="#991b1b"/>
  <rect x="802" y="176" width="42" height="140" fill="#fecaca" stroke="#991b1b"/>
  <rect x="854" y="176" width="42" height="140" fill="#fca5a5" stroke="#991b1b"/>
  <rect x="906" y="176" width="42" height="140" fill="#fee2e2" stroke="#991b1b"/>
  <text x="758" y="338" class="tiny">The</text>
  <text x="798" y="338" class="tiny">analyst</text>
  <text x="850" y="338" class="tiny">expects</text>
  <text x="902" y="338" class="tiny">revenue</text>
  <text x="752" y="204" class="small">0.18</text>
  <text x="804" y="204" class="small">0.26</text>
  <text x="856" y="204" class="small">0.38</text>
  <text x="908" y="204" class="small">0.18</text>
  <text x="746" y="386" class="tiny">Higher color intensity = more attention weight</text>

  <text x="232" y="438" class="label">Weighted value blend</text>
  <rect x="245" y="458" width="120" height="40" class="value"/>
  <text x="284" y="483" class="small">v_The</text>
  <rect x="385" y="458" width="120" height="40" class="value"/>
  <text x="401" y="483" class="small">v_analyst</text>
  <rect x="525" y="458" width="120" height="40" class="value"/>
  <text x="541" y="483" class="small">v_expects</text>
  <rect x="665" y="458" width="120" height="40" class="value"/>
  <text x="678" y="483" class="small">v_revenue</text>
  <path d="M835 350 C780 425, 700 440, 645 458" class="arrow"/>
  <path d="M305 500 C400 535, 615 535, 720 500" class="arrow"/>
  <rect x="820" y="446" width="160" height="66" class="query"/>
  <text x="842" y="475" class="label">z_analyst</text>
  <text x="842" y="498" class="tiny">contextual output</text>
</svg>
