project:
  type: website
  output-dir: _site

  preview:
    port: 4500
    browser: false
    watch-inputs: true
  render:
    - "*.qmd"
    - "!data/"
    - "!help-code/"
    - "!deliverables-solutions/"
editor:  
  preview: true
  markdown:
    wrap: 72

execute:
  fig-align: center
  enable: true
  freeze: auto

