format:
  html:
    theme: [cosmo, ./theme/metanalytics.scss]
    toc: true
    number-sections: true
    embed-resources: true
    format-links: false
    highlight-style: github
    code-overflow: wrap
    html-math-method: katex
    grid:
      sidebar-width: 100px
      body-width: 1100px
      margin-width: 400px
      gutter-width: 1.5rem
    # comments:
    #   utterances:
    #     repo: BostonAnalytics/AD698-generative-ai-for-BA

crossref:
  fig-title: '**Figure**'
  fig-labels: arabic
  title-delim: "**.**"

filters:
  - pseudocode
  
resources:
  - theme/03_geometric.svg